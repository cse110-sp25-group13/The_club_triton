<!doctype html>
<html>
  <!-- Chat Gpt is kinda nuts -->
  <head>
    <title>TritonCard Collection Page Css </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script src="triton-card.js" type="module"></script>
    <!-- <link type="stylesheet" src="triton-card.css"/> -->
    <style>
    .collection-container {
      display: flex;
      height: 100vh;
      font-family: sans-serif;
    }

    .sidebar {
      width: 200px;
      background: #2c2c2c;
      color: white;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-gallery {
      flex-grow: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      padding: 1rem;
      background: #1a1a1a;
    }

    .card {
      background: #3a3a3a;
      color: white;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    :root {
      /* Make sure CSS variables are defined */
      --card-width: 150px;
      background-color: pink;
    }
    </style>
  </head>
  <body>
  <div class="collection-container">
    <top></top>
    <aside class="sidebar">
      <label>Show:</label>
      <select>
        <option>All</option>
        <option>Owned</option>
      </select>

      <label>Sort:</label>
      <select>
        <option>Rank</option>
        <option>Rairty</option>
        <option>Name</option>
      </select>

      <label>Find:</label>
      <input type="text" placeholder="Search...">
    </aside>

    <main class="card-gallery">
      <!-- <div class="card">Card 1</div>
      <div class="card">Card 2</div>
      <div class="card">Card 3</div> -->
      <triton-card></triton-card>
      <triton-card></triton-card>
      <triton-card></triton-card>
      <triton-card></triton-card>
      <!-- Repeat or loop -->
    </main>
  </div>
  </body>
</html>
